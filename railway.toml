# Railway deployment configuration for Vid (Vidya) API

[build]
buildCommand = "pnpm install && pnpm dlx prisma@5.22.0 generate --schema=apps/api/prisma/schema.prisma && pnpm --filter @vidya/api build"

[deploy]
startCommand = "pnpm dlx prisma@5.22.0 db push --accept-data-loss --schema=apps/api/prisma/schema.prisma && node apps/api/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
