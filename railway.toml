# Railway deployment configuration — Vidya Web App
# This file is read when Root Directory is blank (repo root).
# The API service uses apps/api as Root Directory and reads apps/api/railway.toml.

[build]
builder = "nixpacks"
buildCommand = "npm install -g corepack@0.24.1 && corepack enable && pnpm install --frozen-lockfile && pnpm --filter @vidya/web run build"

[deploy]
startCommand = "npx --yes serve apps/web/dist -s -l tcp://0.0.0.0:${PORT:-3000}"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
