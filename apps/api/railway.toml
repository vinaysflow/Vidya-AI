# Railway deployment configuration for Vidya API
# Root Directory must be set to "apps/api" in Railway dashboard

[build]
builder = "nixpacks"
buildCommand = "npm install --include=dev && npx prisma generate --schema prisma/schema.prisma && npx tsc"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
