# Railway deployment configuration for Vidya API (service-level)
# Root railway.toml takes precedence when deploying from git at repo root

[build]
builder = "nixpacks"
buildCommand = "npm install && npx prisma generate --schema prisma/schema.prisma && npm run build"

[deploy]
startCommand = "npx prisma db push --accept-data-loss --schema prisma/schema.prisma 2>&1 || true && node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
