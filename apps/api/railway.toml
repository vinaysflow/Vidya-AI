# Railway deployment configuration for Vidya API (service-level)
# Root railway.toml takes precedence when deploying from git at repo root

[build]
builder = "nixpacks"
buildCommand = "corepack enable && pnpm install --frozen-lockfile && npx prisma generate --schema prisma/schema.prisma && pnpm run build"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
