# Railway deployment configuration for Vidya Web App
# Works with Railway Root Directory set to REPO ROOT (recommended).
# Build runs from monorepo root so pnpm workspace resolution works.
# Start command serves the built static assets from apps/web/dist.

[build]
builder = "nixpacks"
buildCommand = "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @vidya/web run build"

[deploy]
startCommand = "npx --yes serve apps/web/dist -s -l tcp://0.0.0.0:${PORT:-3000}"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
